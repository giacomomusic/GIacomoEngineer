<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Client Portal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .project {
      background: #1e1e1e;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    img {
      max-width: 200px;
      display: block;
      margin-top: 10px;
    }

    audio {
      margin-top: 10px;
      width: 100%;
    }

    button {
      margin-top: 20px;
      padding: 10px 15px;
      background: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Your Projects</h1>

<div id="projects"></div>

<button id="logout">Log Out</button>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabase = createClient(
    'https://wscnygnsnnqkuiyslwsy.supabase.co',
    'sb_publishable_dQIDUqGO778PAoIlz4fvNA_l-6M8NSy'
  )

  const container = document.getElementById('projects')

  // CHECK USER
  const { data: { user } } = await supabase.auth.getUser()

  if (!user) {
    window.location.href = "login.html"
  }

  // FETCH PROJECTS
  const { data, error } = await supabase
    .from('projects')
    .select('*')

  if (error) {
    container.innerHTML = "Error loading projects"
    console.error(error)
  } else {
    if (data.length === 0) {
      container.innerHTML = "No projects yet"
    }

    data.forEach(project => {
      const div = document.createElement('div')
      div.className = 'project'

      div.innerHTML = `
        <h3>${project.name || "Untitled Project"}</h3>
        <p>${project.description || ""}</p>

        ${project.image_url ? `<img src="${project.image_url}">` : ""}
        ${project.audio_url ? `
          <audio controls>
            <source src="${project.audio_url}" type="audio/mpeg">
          </audio>
        ` : ""}
      `

      container.appendChild(div)
    })
  }

  // LOGOUT
  document.getElementById('logout').addEventListener('click', async () => {
    await supabase.auth.signOut()
    window.location.href = "login.html"
  })

</script>

</body>
</html>
