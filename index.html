<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Supabase Login/Signup</title>
</head>

  <input type="email" id="email" placeholder="Email">

  <script type="module" src="app.js"></script>

</html>
