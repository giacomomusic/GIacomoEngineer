<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Studio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at center, #1a1a1a, #000);
      color: white;
      overflow: hidden;
    }

    #studio {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .item {
      position: absolute;
      padding: 12px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      cursor: grab;
      user-select: none;
      backdrop-filter: blur(6px);
      box-shadow: 6px 8px 15px rgba(0,0,0,0.5);
    }

    .note {
      background: #222;
    }

    .button {
      background: white;
      color: black;
      font-weight: bold;
    }

    img {
      max-width: 150px;
      display: block;
    }
  </style>
</head>

<body>

<div id="studio">

  <div class="item note" style="top:20%; left:10%; transform:rotate(-4deg);">
    welcome to the studio
  </div>

  <div class="item note" style="top:45%; left:30%; transform:rotate(3deg);">
    work in progress
  </div>

  <div class="item" style="top:60%; left:60%;">
    <img src="https://via.placeholder.com/150">
  </div>

  <div class="item button" id="enterPortal" style="top:75%; left:70%;">
    client portal →
  </div>

</div>

<script>
  // DRAG SYSTEM
  let z = 1

  document.querySelectorAll('.item').forEach(item => {
    let dragging = false
    let offsetX, offsetY

    item.addEventListener('mousedown', (e) => {
      dragging = true
      offsetX = e.clientX - item.offsetLeft
      offsetY = e.clientY - item.offsetTop
      item.style.zIndex = ++z
    })

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return
      item.style.left = (e.clientX - offsetX) + 'px'
      item.style.top = (e.clientY - offsetY) + 'px'
    })

    document.addEventListener('mouseup', () => dragging = false)
  })

  // ROUTE TO LOGIN OR PRIVATE
  document.getElementById('enterPortal').addEventListener('click', () => {
    window.location.href = 'login.html'
  })
</script>

</body>
</html>
