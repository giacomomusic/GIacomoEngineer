<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Studio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      overflow: hidden;
    }

    /* MAIN CANVAS */
    #studio {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* SCRAPBOOK ITEMS */
    .item {
      position: absolute;
      padding: 12px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      cursor: grab;
      backdrop-filter: blur(6px);
      transition: transform 0.2s;
      user-select: none;
    }

    .item:hover {
      transform: scale(1.05);
    }

    .note {
      background: #222;
      font-size: 14px;
    }

    .button {
      background: #fff;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    .button:hover {
      background: #ddd;
    }

    img {
      display: block;
      max-width: 150px;
    }
  </style>
</head>

<body>

<div id="studio">

  <div class="item note" style="top: 20%; left: 10%;">
    welcome to the studio
  </div>

  <div class="item note" style="top: 50%; left: 30%;">
    latest work coming soon
  </div>

  <div class="item" style="top: 40%; left: 70%;">
    <img src="https://via.placeholder.com/150">
  </div>

  <div class="item" style="top: 60%; left: 20%;">
    <audio controls>
      <source src="" type="audio/mpeg">
    </audio>
  </div>

  <div class="item button" id="enterPortal" style="top: 70%; left: 60%;">
    client portal →
  </div>

</div>

<script>
  const items = document.querySelectorAll('.item')

  items.forEach(item => {
    let isDragging = false
    let offsetX, offsetY

    item.addEventListener('mousedown', (e) => {
      isDragging = true
      offsetX = e.clientX - item.offsetLeft
      offsetY = e.clientY - item.offsetTop
      item.style.cursor = 'grabbing'
    })

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return
      item.style.left = (e.clientX - offsetX) + 'px'
      item.style.top = (e.clientY - offsetY) + 'px'
    })

    document.addEventListener('mouseup', () => {
      isDragging = false
      item.style.cursor = 'grab'
    })
  })

  // CLIENT PORTAL LINK
  document.getElementById('enterPortal').addEventListener('click', () => {
    window.location.href = 'login.html'
  })
</script>

</body>
</html>
