<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Supabase Login/Signup</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input { display: block; margin: 10px 0; padding: 8px; width: 250px; }
    button { padding: 8px 12px; margin-right: 10px; }
    #status { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Login / Signup</h1>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="signup">Sign Up</button>
  <button id="login">Log In</button>
  <p id="status"></p>

  <!-- Embedded JavaScript -->
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // Supabase keys
    const SUPABASE_URL = 'https://wscnygnsnnqkuiyslwsy.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_dQIDUqGO778PAoIlz4fvNA_l-6M8NSy'

    // Initialize Supabase
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    // DOM elements
    const emailInput = document.getElementById('email')
    const passwordInput = document.getElementById('password')
    const signupBtn = document.getElementById('signup')
    const loginBtn = document.getElementById('login')
    const statusP = document.getElementById('status')

    // Signup listener
    signupBtn.addEventListener('click', async () => {
      const { error } = await supabase.auth.signUp({
        email: emailInput.value,
        password: passwordInput.value
      })
      statusP.textContent = error ? 'Error: ' + error.message : 'Signup successful! Check your email.'
    })

    // Login listener
    loginBtn.addEventListener('click', async () => {
      const { error } = await supabase.auth.signInWithPassword({
        email: emailInput.value,
        password: passwordInput.value
      })
      statusP.textContent = error ? 'Error: ' + error.message : 'Login successful!'
    })
  </script>
</body>
</html>
